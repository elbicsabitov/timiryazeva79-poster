<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Информационное объявление — Тимирязева 79 н.п. 18</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    font-family: 'Inter', sans-serif;
    gap: 30px;
    min-height: 100vh;
  }

  h1.page-title {
    font-size: 15px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-align: center;
  }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .controls button {
    padding: 10px 20px;
    border: 1px solid #444;
    background: #2a2a2a;
    color: #ccc;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .controls button:hover { background: #3a3a3a; color: white; }
  .controls button.active { background: white; color: #111; border-color: white; }

  .poster-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  /* 130cm × 56cm — scale ~1:3.5 → 980 × 420 */
  .poster {
    width: 980px;
    height: 420px;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
  }

  /* === DEEP NAVY === */
  .poster.deep-navy { background: #0c1524; border: 2px solid #1a3050; }
  .poster.deep-navy .text-kz { color: #c8a86e; }
  .poster.deep-navy .text-ru { color: #ffffff; }
  .poster.deep-navy .phone { color: #ffffff; }
  .poster.deep-navy .label { color: rgba(255,255,255,0.3); }
  .poster.deep-navy .stripe { background: #c8a86e; }
  .poster.deep-navy .sep { background: #c8a86e; }

  /* === CHARCOAL === */
  .poster.charcoal { background: #181614; border: 2px solid #332e28; }
  .poster.charcoal .text-kz { color: #c9a96e; }
  .poster.charcoal .text-ru { color: #f5f0e8; }
  .poster.charcoal .phone { color: #f5f0e8; }
  .poster.charcoal .label { color: rgba(245,240,232,0.25); }
  .poster.charcoal .stripe { background: #c9a96e; }
  .poster.charcoal .sep { background: #c9a96e; }

  /* === IVORY === */
  .poster.ivory { background: #f6f3ed; border: 2px solid #d0c9bc; }
  .poster.ivory .text-kz { color: #6b5535; }
  .poster.ivory .text-ru { color: #1a1510; }
  .poster.ivory .phone { color: #1a1510; }
  .poster.ivory .label { color: rgba(26,21,16,0.25); }
  .poster.ivory .stripe { background: #6b5535; }
  .poster.ivory .sep { background: #6b5535; }

  /* === FOREST === */
  .poster.forest { background: #0a1810; border: 2px solid #163522; }
  .poster.forest .text-kz { color: #c8a86e; }
  .poster.forest .text-ru { color: #eef5ee; }
  .poster.forest .phone { color: #eef5ee; }
  .poster.forest .label { color: rgba(238,245,238,0.25); }
  .poster.forest .stripe { background: #c8a86e; }
  .poster.forest .sep { background: #c8a86e; }

  /* === LAYOUT === */
  .stripe {
    position: absolute;
    left: 0; right: 0; height: 5px;
  }
  .stripe.top { top: 0; }
  .stripe.bot { bottom: 0; }

  .grid {
    position: absolute;
    top: 8px;
    bottom: 8px;
    left: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .line-kz,
  .line-ru {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1;
    letter-spacing: 2px;
    text-align: center;
    width: 100%;
    font-size: clamp(40px, 6.2vw, 62px);
  }

  .sep {
    height: 2px;
    width: 100%;
    opacity: 0.25;
    flex-shrink: 0;
  }

  .phone {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    line-height: 1;
    text-align: center;
    letter-spacing: 2px;
    font-size: clamp(58px, 9.5vw, 88px);
    white-space: nowrap;
  }

  .phone .code {
    font-weight: 900;
  }

  .label {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 8px;
    text-transform: uppercase;
    text-align: center;
  }

  .size-info {
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<h1 class="page-title">Тимирязева 79, н.п. 18</h1>

<div class="controls">
  <button class="active" onclick="setV('deep-navy')">Синий</button>
  <button onclick="setV('charcoal')">Угольный</button>
  <button onclick="setV('ivory')">Слоновая кость</button>
  <button onclick="setV('forest')">Зелёный</button>
</div>

<div class="poster-col">
  <div class="poster deep-navy" id="posterA">
    <div class="stripe top"></div>
    <div class="stripe bot"></div>
    <div class="grid">
      <div class="line-kz text-kz">Жылжымайтын мүлік сатылады</div>
      <div class="line-ru text-ru">Помещение продаётся</div>
      <div class="sep"></div>
      <div class="phone"><span class="code">+7 777 </span>6 777 964</div>
      <div class="label">собственник</div>
    </div>
  </div>
  <div class="size-info">130 &times; 56 см</div>
</div>

<script>
  const vs = ['deep-navy','charcoal','ivory','forest'];
  function setV(v) {
    document.querySelectorAll('.poster').forEach(p => {
      vs.forEach(c => p.classList.remove(c));
      p.classList.add(v);
    });
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }
</script>
</body>
</html>
