<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1300mm" height="560mm"
     viewBox="0 0 3700 1590">

  <!-- Background -->
  <rect width="3700" height="1590" fill="#0a1810"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="3700" height="35" fill="#c8a86e"/>

  <!-- Bottom accent stripe -->
  <rect x="0" y="1555" width="3700" height="35" fill="#c8a86e"/>

  <!-- Line 1: Kazakh -->
  <text x="1850" y="420"
        text-anchor="middle"
        fill="#c8a86e"
        font-family="Montserrat, Arial Black, sans-serif"
        font-weight="900"
        font-size="155"
        letter-spacing="6"
        text-rendering="geometricPrecision">ЖЫЛЖЫМАЙТЫН МҮЛІК САТЫЛАДЫ</text>

  <!-- Line 2: Russian -->
  <text x="1850" y="660"
        text-anchor="middle"
        fill="#eef5ee"
        font-family="Montserrat, Arial Black, sans-serif"
        font-weight="900"
        font-size="155"
        letter-spacing="6"
        text-rendering="geometricPrecision">ПОМЕЩЕНИЕ ПРОДАЁТСЯ</text>

  <!-- Separator -->
  <rect x="80" y="740" width="3540" height="5" fill="#c8a86e" opacity="0.25"/>

  <!-- Phone -->
  <text x="1850" y="1080"
        text-anchor="middle"
        fill="#eef5ee"
        font-family="Montserrat, Arial Black, sans-serif"
        font-weight="900"
        font-size="240"
        letter-spacing="6"
        text-rendering="geometricPrecision">+7 777 6 777 964</text>

  <!-- Label -->
  <text x="1850" y="1260"
        text-anchor="middle"
        fill="#eef5ee"
        fill-opacity="0.25"
        font-family="Inter, Arial, sans-serif"
        font-weight="600"
        font-size="45"
        letter-spacing="20"
        text-rendering="geometricPrecision">СОБСТВЕННИК</text>

</svg>
